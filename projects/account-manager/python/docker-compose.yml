services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testaccounts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "3004:8000"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: testaccounts
      DB_USER: postgres
      DB_PASSWORD: "1234"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
