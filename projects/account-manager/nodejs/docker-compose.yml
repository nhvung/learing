version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testaccounts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "3000:3000"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: testaccounts
      DB_USER: postgres
      DB_PASSWORD: "1234"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
