worker_processes auto;
events { worker_connections 1024; }

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile     on;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;

        # Landing page
        location = / {
            try_files /index.html =404;
        }

        # ── Docs viewer ──────────────────────────────────────────────────────
        location = /docs { return 301 /docs/; }
        location /docs/ {
            proxy_pass       http://viewer:3333/;
            proxy_set_header Host $host;
            proxy_set_header Accept-Encoding "";
        }
        # Viewer API (app.js uses absolute paths /api/tree, /api/file, /api/projects)
        location /api/tree     { proxy_pass http://viewer:3333/api/tree; }
        location /api/projects { proxy_pass http://viewer:3333/api/projects; }
        location /api/file     { proxy_pass http://viewer:3333/api/file; }

        # ── Node.js ──────────────────────────────────────────────────────────
        location = /nodejs { return 301 /nodejs/; }
        location /nodejs/ {
            proxy_pass            http://nodejs-backend:3000/;
            proxy_set_header      Host $host;
            proxy_set_header      Accept-Encoding "";
            sub_filter            '<head>' '<head><script>window.LANG_BASE="/nodejs"</script>';
            sub_filter_once       on;
            sub_filter_types      text/html;
        }

        # ── Go ───────────────────────────────────────────────────────────────
        location = /go { return 301 /go/; }
        location /go/ {
            proxy_pass            http://go-backend:3000/;
            proxy_set_header      Host $host;
            proxy_set_header      Accept-Encoding "";
            sub_filter            '<head>' '<head><script>window.LANG_BASE="/go"</script>';
            sub_filter_once       on;
            sub_filter_types      text/html;
        }

        # ── Java ─────────────────────────────────────────────────────────────
        location = /java { return 301 /java/; }
        location /java/ {
            proxy_pass            http://java-backend:8080/;
            proxy_set_header      Host $host;
            proxy_set_header      Accept-Encoding "";
            sub_filter            '<head>' '<head><script>window.LANG_BASE="/java"</script>';
            sub_filter_once       on;
            sub_filter_types      text/html;
        }

        # ── .NET ─────────────────────────────────────────────────────────────
        location = /dotnet { return 301 /dotnet/; }
        location /dotnet/ {
            proxy_pass            http://dotnet-backend:8080/;
            proxy_set_header      Host $host;
            proxy_set_header      Accept-Encoding "";
            sub_filter            '<head>' '<head><script>window.LANG_BASE="/dotnet"</script>';
            sub_filter_once       on;
            sub_filter_types      text/html;
        }

        # ── Python ───────────────────────────────────────────────────────────
        location = /python { return 301 /python/; }
        location /python/ {
            proxy_pass            http://python-backend:8000/;
            proxy_set_header      Host $host;
            proxy_set_header      Accept-Encoding "";
            sub_filter            '<head>' '<head><script>window.LANG_BASE="/python"</script>';
            sub_filter_once       on;
            sub_filter_types      text/html;
        }
    }
}
