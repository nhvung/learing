services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: testaccounts
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "1234"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    ports:
      - "3002:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: testaccounts
      DB_USER: postgres
      DB_PASSWORD: "1234"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pg_data:
